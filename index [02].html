<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML FORM</title>
</head>
<body>
    <h1> HTML Form </h1>
    <hr>

    <form action="./controller.html">
        <label for="Name"> Name: </label>
        <input required type="text" id="Name" placeholder="Enter Your Name*">
        <br><br>
        <label for="Email">Email: </label>
        <input type="Email" id="Email" placeholder="Enter your valid email*">
        <br><br>
        <label for="Phone">Phone: </label>
        <input type="text" id="Phone" placeholder="Enter phone number*">
        <br><br>
        <label for="Password"> Password: </label>
        <input type="password" id="Password" placeholder="Enter your password*">
        <br><br>
        <label for="Date of Birth">Date of Birth: </label>
        <input type="date" id="Date of Birth" placeholder="Enter your date">
        <br><br>
        <label for="date_time">Date & Time:</label>
        <input type="datetime-local" id="date_time">
        <br><br>
        <label> for="time">Time:</label>
        <input type="time" id="time">
        <br><br>
        <label for="color">Color</label>
        <input type="color" id="color">
        <br><br>
        <label for="search">Search:</label>
        <input type="search" id="search" placeholder="Search here">
        <br><br>
        <label for="comment">Comment:</label>
        <br>
        <textarea rows="2" cols="20" placeholder="write your comment here..." name="text" id="comment"></textarea>
        <br>
        <p>Upload your Image</p>
        <label for="file">
            <img src="./woman.webp" width="150" alt="">
        </label>

        <input id="file" hidden type="file" accept=".png">
        <br><br>

        <label for="select">Select Division: </label>
        <select name="division" id="select">
            <option value="" disabled selected >Select here...</option>
            <option value="Barishal">Barishal</option>
            <option value="Chattogram">Chattogram</option>
            <option value="Dhaka">Dhaka</option>
            <option value="khulna">Khulna</option>
            <option value="mymensingh">Mymensingh</option>
            <option value="rajshahi">Rajshahi</option>
            <option value="sylhet">Sylhet</option>
            <option value="rangpur">Rangpur</option>

        </select>
        <br>
        <p>Gender:</p>
        <input type="radio" id="Male" name="Gender"  value="Male">
        <label for="male">Male</label>

        <input type="radio" id="Female" name="Gender" value="Female">
        <label for="female">Female</label>

        <input type="radio" id="Others" name="Gender" value="Other">
        <label for="other">Other</label>
        <br><br>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>
</body>
</html>
